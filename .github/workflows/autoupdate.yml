name: AUTOUPDATE

on:
  schedule:
    - cron: "*/10 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  autoupdate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Requests
        run: pip install requests

      - name: Ejecutar AUTOUPDATE
        run: python AUTOUPDATE.py

      - name: Commit automático
        id: commit
        shell: bash
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add novaplay.json

          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No hubo cambios."
          else
            git commit -m "AUTOUPDATE"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Subir novaplay.json a Supabase Storage
        if: steps.commit.outputs.changed == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          python << EOF
          import requests

          with open("novaplay.json", "rb") as f:
              r = requests.post(
                  f"${SUPABASE_URL}/storage/v1/object/Novaplay/novaplay.json",
                  headers={
                      "Authorization": f"Bearer ${SUPABASE_SECRET_KEY}",
                      "Content-Type": "application/json",
                      "x-upsert": "true"
                  },
                  data=f
              )

          print("Código:", r.status_code)
          print(r.text)

          r.raise_for_status()

          print("Archivo subido correctamente a Supabase.")
          EOF
