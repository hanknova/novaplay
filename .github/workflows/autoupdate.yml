name: AUTOUPDATE
run: |
    nl -ba AUTOUPDATE.py | sed -n '1,30p'
    
on:
  schedule:
    - cron: "*/10 * * * *"

  workflow_dispatch:

  push:
    paths:
      - "novaplay.json"

permissions:
  contents: write

jobs:
  autoupdate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Requests
        run: pip install requests

      - name: Ejecutar AUTOUPDATE
        run: python AUTOUPDATE.py

      - name: Commit automático
        id: commit
        shell: bash
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add novaplay.json

          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No hubo cambios."
          else
            git commit -m "AUTOUPDATE"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Subir novaplay.json a Supabase Storage (LEGACY)
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'push'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python << 'EOF'
          import requests
          import os

          url = f"{os.environ['SUPABASE_URL']}/storage/v1/object/Novaplay/novaplay.json"

          headers = {
              "Authorization": f"Bearer {os.environ['SUPABASE_SERVICE_ROLE_KEY']}",
              "apikey": os.environ['SUPABASE_SERVICE_ROLE_KEY'],
              "Content-Type": "application/json",
              "x-upsert": "true"
          }

          with open("novaplay.json", "rb") as f:
              r = requests.post(url, headers=headers, data=f)

          print("Código:", r.status_code)
          print(r.text)

          r.raise_for_status()

          print("✔ Subido correctamente a Supabase (LEGACY).")
          EOF
