<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaPlay Admin</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:system-ui, Arial;
  background:#0b0f14;
  color:#fff;
}

/* layout */
.wrapper{
  max-width:600px;
  width:100%;
  margin:auto;
  padding:16px;
}

/* card */
.card{
  width:100%;
  background:#121824;
  border:1px solid #1f2a3a;
  border-radius:16px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.35);
  overflow:hidden;
}

h1{
  font-size:18px;
  margin-bottom:15px;
}

.section-title{
  font-size:12px;
  opacity:0.6;
  margin-top:10px;
  margin-bottom:5px;
}

input, select, textarea{
  width:100%;
  max-width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #2a3445;
  background:#0e141d;
  color:#fff;
  outline:none;
}

textarea{
  height:80px;
  resize:none;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#00d0ff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.status{
  margin-top:10px;
  font-size:13px;
  text-align:center;
  opacity:0.8;
}

.hidden{
  display:none;
}

</style>
</head>

<body>

<div class="wrapper">

  <div class="card">

    <h1>NovaPlay Admin Panel</h1>

    <div class="section-title">Categoría</div>
    <select id="category"></select>

    <div class="section-title">Datos del canal</div>

    <input id="name" placeholder="Nombre del canal">
    <input id="url" placeholder="URL stream">
    <input id="logo" placeholder="Logo URL">

    <input id="info" placeholder="Info (Ej: Español)">
    <textarea id="texto" placeholder="Descripción"></textarea>

    <div class="section-title">NSFW</div>
    <select id="nsfw">
      <option value="no">No</option>
      <option value="yes">Sí</option>
    </select>

    <div class="section-title">Protección</div>
    <select id="protection" onchange="toggleProtection()">
      <option value="no">No</option>
      <option value="yes">Sí</option>
    </select>

    <div id="protectBox" class="hidden">

      <div class="section-title">Referer</div>
      <input id="referer" placeholder="https://...">

      <div class="section-title">DRM Type</div>
      <input id="drmType" placeholder="widevine / playready">

      <div class="section-title">License URL</div>
      <input id="license" placeholder="https://license...">

    </div>

    <button onclick="send()">Agregar Canal</button>

    <div class="status" id="status"></div>

  </div>

</div>

<script>

const API =
"https://api.github.com/repos/ThedarkSoldier996/test/dispatches";

const RAW =
"https://raw.githubusercontent.com/ThedarkSoldier996/test/main/novaplay.json";

/* cargar categorías */
async function loadCategories(){

  try{

    const res = await fetch(RAW + "?t=" + Date.now());
    const data = await res.json();

    const select = document.getElementById("category");
    select.innerHTML = "";

    data
      .filter(x =>
        x.type === "category" &&
        x.title &&
        !x.title.toLowerCase().includes("pluto") &&
        !x.title.toLowerCase().includes("rakuten")
      )
      .forEach(cat => {

        const opt = document.createElement("option");

        opt.value = cat.title;
        opt.textContent = cat.title;

        select.appendChild(opt);

      });

  }catch(e){

    document.getElementById("status").innerText =
      "Error cargando categorías";

  }
}

/* mostrar/ocultar protección */
function toggleProtection(){

  const val =
    document.getElementById("protection").value;

  document.getElementById("protectBox").style.display =
    val === "yes" ? "block" : "none";
}

/* enviar a GitHub Actions */
async function send(){

  const payload = {

    category: category.value,
    name: name.value,
    url: url.value,
    logo: logo.value,
    info: info.value,
    texto: texto.value,
    nsfw: nsfw.value,

    protection: protection.value,
    referer: referer.value,
    drmType: drmType.value,
    license: license.value

  };

  document.getElementById("status").innerText =
    "Enviando...";

  try{

    await fetch(API, {
      method:"POST",
      headers:{
        "Accept":"application/vnd.github+json",
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        event_type:"add_channel",
        client_payload:payload
      })
    });

    document.getElementById("status").innerText =
      "Canal agregado ✔";

  }catch(e){

    document.getElementById("status").innerText =
      "Error de envío";

  }
}

loadCategories();

</script>

</body>
</html>
