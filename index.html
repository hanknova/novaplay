<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaPlay OTT Admin</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:system-ui, Arial;
  background:#0a0d12;
  color:#fff;
}

/* layout */
.app{
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* sidebar */
.sidebar{
  width:240px;
  background:#0f141c;
  border-right:1px solid #1f2a3a;
  padding:12px;
  overflow-y:auto;
}

.sidebar h3{
  font-size:13px;
  opacity:0.6;
  margin-bottom:10px;
}

.cat{
  padding:10px;
  margin-bottom:6px;
  border-radius:8px;
  background:#151c27;
  cursor:pointer;
  font-size:13px;
}

.cat:hover{
  background:#1d2635;
}

/* main */
.main{
  flex:1;
  padding:16px;
  overflow-y:auto;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(140px,1fr));
  gap:12px;
}

/* card */
.card{
  background:#121a25;
  border:1px solid #1f2a3a;
  border-radius:12px;
  padding:10px;
  text-align:center;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:70px;
  object-fit:contain;
}

.name{
  font-size:12px;
  margin-top:6px;
}

/* header */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.badge{
  font-size:10px;
  background:#ff2d55;
  padding:2px 6px;
  border-radius:6px;
  margin-top:4px;
  display:inline-block;
}

</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>CATEGORÍAS</h3>
    <div id="cats"></div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="top">
      <h3 id="title">Canales</h3>
    </div>

    <div class="grid" id="grid"></div>

  </div>

</div>

<script>

const RAW =
"https://raw.githubusercontent.com/ThedarkSoldier996/test/main/novaplay.json";

let DATA = [];

/* INIT */
async function load(){

  const res = await fetch(RAW + "?t=" + Date.now());
  DATA = await res.json();

  renderCategories();

}

/* FILTRO GLOBAL */
function isAllowed(text){

  if(!text) return true;

  const t = text.toLowerCase();

  return !t.includes("pluto") &&
         !t.includes("pluto tv") &&
         !t.includes("rakuten") &&
         !t.includes("rakuten tv");
}

/* CATEGORÍAS */
function renderCategories(){

  const el = document.getElementById("cats");
  el.innerHTML = "";

  DATA
    .filter(c =>
      c.type === "category" &&
      isAllowed(c.title)
    )
    .forEach(cat => {

      const div = document.createElement("div");
      div.className = "cat";

      div.innerHTML = `
        ${cat.title}
        <div style="font-size:10px;opacity:0.5;">
          ${(cat.channels || []).length} canales
        </div>
      `;

      div.onclick = () => {
        renderChannels(cat.channels || []);
      };

      el.appendChild(div);

    });

  // auto primera categoría
  const first = DATA.find(x =>
    x.type === "category"
  );

  if(first){
    renderChannels(first.channels || []);
  }
}

/* CANALES */
function renderChannels(channels){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  document.getElementById("title").innerText =
    "Canales";

  channels
    .filter(ch =>
      isAllowed(ch.name)
    )
    .forEach(ch => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${ch.logo || ''}">
        <div class="name">${ch.name}</div>
        ${ch.nsfw === "yes"
          ? '<div class="badge">NSFW</div>'
          : ''
        }
      `;

      grid.appendChild(card);

    });

}

load();

</script>

</body>
</html>
